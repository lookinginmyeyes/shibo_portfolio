# 推送到 main 时构建前端并发布到 GitHub Pages
# 使用前请在仓库 Settings → Pages → Build and deployment → Source 选「GitHub Actions」
# 并在 Settings → Secrets and variables → Actions → Variables 新增：
#   VITE_API_BASE = 你的后端 HTTPS 地址（无末尾斜杠，如 https://api.example.com）

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: my-project-frontend/package-lock.json

      - name: Install and build
        working-directory: my-project-frontend
        env:
          # 与仓库名一致；若使用用户名.github.io 仓库做根域名站，改为 VITE_BASE_PATH=/
          VITE_BASE_PATH: /shibo_portfolio/
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: my-project-frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
